name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q careerpilot tests

      - name: Run tests
        run: pytest -q

  docker-build:
    name: Build and smoke-test Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --tag careerpilot-langgraph:ci .

      - name: Start container
        run: |
          docker run --detach             --name careerpilot-ci             --publish 8001:8001             careerpilot-langgraph:ci

      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8001/health; then
              echo
              exit 0
            fi
            sleep 2
          done

          echo "Container did not become healthy in time."
          docker logs careerpilot-ci
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker logs careerpilot-ci || true

      - name: Stop container
        if: always()
        run: docker rm --force careerpilot-ci || true
