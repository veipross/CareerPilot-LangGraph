services:
  careerpilot:
    build:
      context: .
      dockerfile: Dockerfile
    image: careerpilot-langgraph:local
    container_name: careerpilot-langgraph
    init: true
    ports:
      - "${CAREERPILOT_PORT:-8001}:8001"
    environment:
      CAREERPILOT_LLM_PROVIDER: "${CAREERPILOT_LLM_PROVIDER:-deepseek}"
      CAREERPILOT_LLM_TEMPERATURE: "${CAREERPILOT_LLM_TEMPERATURE:-0.2}"
      CAREERPILOT_LLM_MAX_TOKENS: "${CAREERPILOT_LLM_MAX_TOKENS:-2048}"
      CAREERPILOT_LLM_TIMEOUT: "${CAREERPILOT_LLM_TIMEOUT:-60}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      CAREERPILOT_DEEPSEEK_BASE_URL: "${CAREERPILOT_DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      CAREERPILOT_DEEPSEEK_MODEL: "${CAREERPILOT_DEEPSEEK_MODEL:-deepseek-v4-flash}"
      DASHSCOPE_API_KEY: "${DASHSCOPE_API_KEY:-}"
      CAREERPILOT_QWEN_BASE_URL: "${CAREERPILOT_QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}"
      CAREERPILOT_QWEN_MODEL: "${CAREERPILOT_QWEN_MODEL:-qwen-plus}"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
